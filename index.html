<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Intelligence</title>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA52rHz97hUeTqobqmAbY58NLjkfO5O4jg",
  authDomain: "transportes-1af13.firebaseapp.com",
  projectId: "transportes-1af13"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.doc = doc;
window.updateDoc = updateDoc;
</script>

<style>
body { margin:0; font-family:Segoe UI; background:#f1f5f9;}

.header {
  background:#0f172a;
  color:#fff;
  padding:15px;
  font-weight:bold;
}

.container { padding:20px; }

.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

.primary { background:#2563eb; color:#fff;}
.dark { background:#111827; color:#fff;}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.hidden { display:none; }

.status {
  font-size:12px;
  padding:4px 8px;
  border-radius:5px;
}

.aberta { background:#f59e0b; color:#fff;}
.fechada { background:#16a34a; color:#fff;}

.kpis { display:flex; gap:10px; flex-wrap:wrap;}
.kpi { flex:1; text-align:center; }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
</style>

</head>

<body>

<div class="header">Fleet Intelligence</div>

<div class="container">

<!-- LOGIN -->
<div id="telaLogin">
<button class="btn primary" onclick="goOperador()">Operador</button>
<button class="btn dark" onclick="goGestor()">Gestor</button>
</div>

<!-- OPERADOR -->
<div id="telaOperador" class="hidden">
<h3>Criar Viagem</h3>

<input id="origem">
<input id="destino">
<input id="frete">

<button class="btn primary" onclick="criarViagem()">Criar</button>
</div>

<!-- DASHBOARD -->
<div id="telaDashboard" class="hidden">

<div class="kpis">
<div class="card kpi">Total <br><b id="k1"></b></div>
<div class="card kpi">Abertas <br><b id="k2"></b></div>
<div class="card kpi">Fechadas <br><b id="k3"></b></div>
<div class="card kpi">Lucro <br><b id="k4"></b></div>
</div>

<div id="lista"></div>

</div>

<!-- DETALHE -->
<div id="telaDetalhe" class="hidden">

<button onclick="voltar()">⬅</button>

<h3 id="titulo"></h3>

<div id="resumo"></div>

<input id="tipo">
<input id="valor">

<button class="btn primary" onclick="addDespesa()">Adicionar</button>
<button class="btn dark" onclick="fecharViagem()">Finalizar</button>

<div id="despesas"></div>

</div>

</div>

<script>

let state = {
  viagem: null
};

/* NAV */
function goOperador(){
  show("telaOperador");
}

function goGestor(){
  let s = prompt("Senha");
  if(s==="1234"){
    show("telaDashboard");
    loadDashboard();
  }
}

function show(id){
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* CRUD */
async function criarViagem(){
  await addDoc(collection(db,"viagens"),{
    origem: origem.value,
    destino: destino.value,
    frete:Number(frete.value),
    status:"aberta"
  });
  alert("Criado");
}

/* DASHBOARD */
async function loadDashboard(){

let snap = await getDocs(collection(db,"viagens"));

let total=0, abertas=0, fechadas=0, lucro=0;
let html="";

for(let v of snap.docs){

let data=v.data();

let despSnap=await getDocs(collection(db,"viagens",v.id,"despesas"));

let desp=0;
despSnap.forEach(d=>desp+=d.data().valor);

let l=data.frete-desp;

total++;
if(data.status==="aberta") abertas++; else fechadas++;
lucro+=l;

html+=`
<div class="card" onclick="openViagem('${v.id}','${data.origem}','${data.destino}',${data.frete})">
<b>${data.origem} → ${data.destino}</b><br>
<span class="status ${data.status}">${data.status}</span><br><br>
Lucro: R$ ${l}
</div>`;
}

lista.innerHTML=html;
k1.innerText=total;
k2.innerText=abertas;
k3.innerText=fechadas;
k4.innerText="R$ "+lucro;

}

/* DETALHE */
async function openViagem(id,o,d,f){

state.viagem=id;

show("telaDetalhe");

titulo.innerText=o+" → "+d;

let snap=await getDocs(collection(db,"viagens",id,"despesas"));

let html="";
let total=0;

snap.forEach(x=>{
  html+=`<div>${x.data().tipo} - R$ ${x.data().valor}</div>`;
  total+=x.data().valor;
});

despesas.innerHTML=html;

resumo.innerHTML=`
Receita: ${f}<br>
Despesa: ${total}<br>
Lucro: ${f-total}
`;

}

async function addDespesa(){

await addDoc(collection(db,"viagens",state.viagem,"despesas"),{
  tipo:tipo.value,
  valor:Number(valor.value)
});

openViagem(state.viagem,"","","");

}

async function fecharViagem(){
await updateDoc(doc(db,"viagens",state.viagem),{status:"fechada"});
voltar();
}

function voltar(){
show("telaDashboard");
loadDashboard();
}

</script>

</body>
</html>
