<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Transportes</title>

<style>

/* FUNDO */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0ea5e9,#0284c7);
  display:flex;
  justify-content:center;
}

/* ÁREA CENTRAL */
.app {
  width:100%;
  max-width:500px;
}

/* HEADER */
.header {
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* CONTAINER */
.container {
  padding:15px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-top:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* BOTÕES */
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#0ea5e9;
  color:#fff;
  font-weight:600;
  font-size:15px;
}

button.secondary {
  background:#111827;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

/* STATUS */
.status {
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.aberta { background:#f59e0b; color:#fff;}
.concluida { background:#3b82f6; color:#fff;}
.aprovada { background:#16a34a; color:#fff;}

/* TEXTO */
.lucroPos { color:#16a34a; font-weight:600;}
.lucroNeg { color:#dc2626; font-weight:600;}

.hidden { display:none; }

</style>

</head>

<body>

<div class="app">

<div class="header">🚛 Gestão Grilazer</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
<button onclick="entrarOperador()">👷 Operador</button>
<button class="secondary" onclick="entrarGestor()">📊 Gestor</button>
</div>

<!-- OPERADOR -->
<div id="operador" class="hidden">

<div class="card">
<h3>Nova Viagem</h3>
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="frete" placeholder="Frete">
<button onclick="criarViagem()">Criar Viagem</button>
</div>

<div id="listaOperador"></div>

</div>

<!-- GESTOR -->
<div id="gestor" class="hidden">
<div id="dashboard"></div>
</div>

<!-- DETALHE -->
<div id="detalhe" class="hidden">

<button onclick="voltar()">⬅ Voltar</button>

<div class="card">
<h3 id="titulo"></h3>
<div id="resumo"></div>
</div>

<div class="card">
<h4>Adicionar Despesa</h4>
<input id="tipo" placeholder="Tipo">
<input id="valor" placeholder="Valor">
<button onclick="addDespesa()">Adicionar</button>
<button onclick="finalizar()">Finalizar</button>
<div id="btnAprovar"></div>
</div>

<div id="listaDespesas"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA52rHz97hUeTqobqmAbY58NLjkfO5O4jg",
  authDomain: "transportes-1af13.firebaseapp.com",
  projectId: "transportes-1af13"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let viagemAtual = null;
let freteAtual = 0;
let perfil = null;
let statusAtual = null;

/* LOGIN */
window.entrarOperador = function(){
perfil = "operador";
login.style.display="none";
operador.classList.remove("hidden");
carregarOperador();
}

window.entrarGestor = function(){
let s = prompt("Senha:");
if(s==="1234"){
perfil = "gestor";
login.style.display="none";
gestor.classList.remove("hidden");
carregarGestor();
}
}

/* CRIAR */
window.criarViagem = async function(){

await addDoc(collection(db,"viagens"),{
origem: origem.value,
destino: destino.value,
frete: Number(frete.value),
status:"aberta"
});

carregarOperador();
}

/* OPERADOR */
async function carregarOperador(){

let snap = await getDocs(collection(db,"viagens"));
let html="";

snap.forEach(d=>{
let v = d.data();

html+=`
<div class="card" onclick="abrir('${d.id}')">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span>
</div>
`;
});

listaOperador.innerHTML = html;
}

/* GESTOR */
async function carregarGestor(){

let snap = await getDocs(collection(db,"viagens"));
let html="";

for(let d of snap.docs){

let v = d.data();

let despSnap = await getDocs(collection(db,"viagens",d.id,"despesas"));

let total=0;
despSnap.forEach(x=> total+=x.data().valor);

let lucro = v.frete - total;

html+=`
<div class="card" onclick="abrirGestor('${d.id}')">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span><br><br>
Lucro: <span class="${lucro>=0?'lucroPos':'lucroNeg'}">R$ ${lucro}</span>
</div>
`;
}

dashboard.innerHTML = html;
}

/* DETALHE */
window.abrir = async function(id){

viagemAtual = id;

operador.classList.add("hidden");
detalhe.classList.remove("hidden");

let snap = await getDocs(collection(db,"viagens"));

snap.forEach(d=>{
if(d.id===id){
titulo.innerText = d.data().origem+" → "+d.data().destino;
freteAtual = d.data().frete;
statusAtual = d.data().status;
}
});

carregarDetalhe();
}

window.abrirGestor = async function(id){
gestor.classList.add("hidden");
await abrir(id);
}

/* DETALHE */
async function carregarDetalhe(){

let snap = await getDocs(collection(db,"viagens",viagemAtual,"despesas"));

let html="";
let total=0;

snap.forEach(d=>{
html+=`<div class="card">${d.data().tipo} - R$ ${d.data().valor}</div>`;
total+=d.data().valor;
});

listaDespesas.innerHTML = html;

resumo.innerHTML = `
Receita: R$ ${freteAtual}<br>
Despesa: R$ ${total}<br>
Lucro: <b class="${freteAtual-total>=0?'lucroPos':'lucroNeg'}">R$ ${freteAtual-total}</b>
`;

if(perfil==="gestor" && statusAtual==="concluida"){
btnAprovar.innerHTML = `<button onclick="aprovarAtual()">Aprovar</button>`;
}else{
btnAprovar.innerHTML = "";
}
}

/* DESPESA */
window.addDespesa = async function(){

await addDoc(collection(db,"viagens",viagemAtual,"despesas"),{
tipo: tipo.value,
valor: Number(valor.value)
});

carregarDetalhe();
}

/* FINALIZAR */
window.finalizar = async function(){

await updateDoc(doc(db,"viagens",viagemAtual),{
status:"concluida"
});

voltar();
}

/* APROVAR */
window.aprovarAtual = async function(){

await updateDoc(doc(db,"viagens",viagemAtual),{
status:"aprovada"
});

voltar();
}

/* VOLTAR */
window.voltar = function(){

detalhe.classList.add("hidden");

if(perfil==="gestor"){
gestor.classList.remove("hidden");
carregarGestor();
}else{
operador.classList.remove("hidden");
carregarOperador();
}
}

</script>

</body>
</html>
