<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Transportes</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8;}
.header { background:#1e3a8a; color:#fff; padding:15px; font-weight:bold;}
.container { padding:15px;}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
}

.status {
  padding:5px 10px;
  border-radius:5px;
  font-size:12px;
}

.aberta { background:orange; color:#fff;}
.concluida { background:#2563eb; color:#fff;}
.aprovada { background:green; color:#fff;}

.hidden { display:none; }

</style>
</head>

<body>

<div class="header">🚛 Gestão de Transportes</div>

<div class="container">

<div id="login">
<button onclick="operador()">Operador</button>
<button onclick="gestor()">Gestor</button>
</div>

<div id="telaOperador" class="hidden">

<h3>Nova Viagem</h3>
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="frete" placeholder="Frete">

<button onclick="criarViagem()">Criar Viagem</button>

<div id="listaOperador"></div>

</div>

<div id="telaGestor" class="hidden">
<h3>Painel Gestor</h3>
<div id="listaGestor"></div>
</div>

<div id="telaDetalhe" class="hidden">

<button onclick="voltar()">⬅ Voltar</button>

<h3 id="titulo"></h3>

<div id="resumo"></div>

<h4>Adicionar Despesa</h4>
<input id="tipo" placeholder="Tipo">
<input id="valor" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>
<button onclick="finalizar()">Finalizar Viagem</button>

<div id="despesas"></div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA52rHz97hUeTqobqmAbY58NLjkfO5O4jg",
  authDomain: "transportes-1af13.firebaseapp.com",
  projectId: "transportes-1af13"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.operador = function(){
  login.style.display="none";
  telaOperador.classList.remove("hidden");
  carregarOperador();
}

window.gestor = function(){
  let s = prompt("Senha:");
  if(s === "1234"){
    login.style.display="none";
    telaGestor.classList.remove("hidden");
    carregarGestor();
  }
}

/* CRIAR */
window.criarViagem = async function(){

await addDoc(collection(db,"viagens"),{
  origem: origem.value,
  destino: destino.value,
  frete: Number(frete.value),
  status:"aberta"
});

alert("Criado!");
carregarOperador();

}

/* OPERADOR */
window.carregarOperador = async function(){

let snap = await getDocs(collection(db,"viagens"));
let html="";

snap.forEach(d=>{
let v = d.data();

html+=`
<div class="card" onclick="abrir('${d.id}')">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span>
</div>
`;
});

listaOperador.innerHTML = html;

}

/* GESTOR */
window.carregarGestor = async function(){

let snap = await getDocs(collection(db,"viagens"));
let html="";

for(let d of snap.docs){

let v = d.data();

let despSnap = await getDocs(collection(db,"viagens",d.id,"despesas"));

let total=0;
despSnap.forEach(x=> total+=x.data().valor);

let lucro = v.frete - total;

html+=`
<div class="card">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span><br><br>

Receita: ${v.frete}<br>
Despesa: ${total}<br>
Lucro: ${lucro}<br>

${v.status==="concluida" ? `<button onclick="aprovar('${d.id}')">Aprovar</button>` : ""}

</div>
`;
}

listaGestor.innerHTML = html;

}

/* DETALHE */
let viagemAtual = null;

window.abrir = async function(id){

viagemAtual = id;

telaOperador.classList.add("hidden");
telaDetalhe.classList.remove("hidden");

let docSnap = await getDocs(collection(db,"viagens"));

docSnap.forEach(d=>{
if(d.id === id){
titulo.innerText = d.data().origem + " → " + d.data().destino;
freteAtual = d.data().frete;
}
});

carregarDetalhe();

}

async function carregarDetalhe(){

let snap = await getDocs(collection(db,"viagens",viagemAtual,"despesas"));

let html="";
let total=0;

snap.forEach(d=>{
html+=`<div>${d.data().tipo} - ${d.data().valor}</div>`;
total+=d.data().valor;
});

despesas.innerHTML = html;

resumo.innerHTML = `
Receita: ${freteAtual}<br>
Despesa: ${total}<br>
Lucro: ${freteAtual-total}
`;

}

/* DESPESA */
window.addDespesa = async function(){

await addDoc(collection(db,"viagens",viagemAtual,"despesas"),{
tipo: tipo.value,
valor: Number(valor.value)
});

carregarDetalhe();

}

/* FINALIZAR */
window.finalizar = async function(){

await updateDoc(doc(db,"viagens",viagemAtual),{
status:"concluida"
});

alert("Finalizada!");
voltar();

}

/* APROVAR */
window.aprovar = async function(id){

await updateDoc(doc(db,"viagens",id),{
status:"aprovada"
});

carregarGestor();

}

/* VOLTAR */
window.voltar = function(){
telaDetalhe.classList.add("hidden");
telaOperador.classList.remove("hidden");
carregarOperador();
}

</script>

</body>
</html>
