<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportes PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* FUNDO */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0ea5e9,#0284c7);
  display:flex;
  justify-content:center;
}

/* APP */
.app {
  width:100%;
  max-width:520px;
}

/* HEADER */
.header {
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:600;
}

/* CONTAINER */
.container { padding:15px; }

/* CARD */
.card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-top:12px;
  box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* BOTÕES */
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#0ea5e9;
  color:#fff;
  font-weight:600;
  font-size:15px;
}

/* INPUT */
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

/* STATUS */
.status {
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.aberta { background:#f59e0b; color:#fff;}
.concluida { background:#3b82f6; color:#fff;}
.aprovada { background:#16a34a; color:#fff;}

.hidden { display:none; }

/* DESPESAS */
.despesa {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
}

.despesa i {
  font-size:18px;
  width:25px;
  text-align:center;
}

</style>

</head>

<body>

<div class="app">
<div class="header">🚛 Transportes PRO</div>

<div class="container">

<div id="login" class="card">
<button onclick="entrarOperador()">👷 Operador</button>
<button onclick="entrarGestor()">📊 Gestor</button>
</div>

<div id="operador" class="hidden">

<div class="card">
<h3>Nova Viagem</h3>

<input id="motorista" placeholder="Motorista">
<input id="origem" placeholder="Cidade Origem">
<input id="destino" placeholder="Cidade Destino">

<input id="localCarga" placeholder="Local Carregamento">
<input type="datetime-local" id="dataCarga">

<input id="localDescarga" placeholder="Local Descarregamento">
<input type="datetime-local" id="dataDescarga">

<input id="frete" placeholder="Frete">

<button onclick="criarViagem()">Criar Viagem</button>
</div>

<div id="listaOperador"></div>

</div>

<div id="gestor" class="hidden">
<div id="dashboard"></div>
</div>

<div id="detalhe" class="hidden">

<button onclick="voltar()">⬅ Voltar</button>

<div class="card">
<h3 id="titulo"></h3>
<div id="resumo"></div>
</div>

<div class="card">
<select id="tipo"></select>
<input id="valor" placeholder="Valor">
<button onclick="addDespesa()">Adicionar</button>
<button id="btnFinalizar" onclick="finalizar()">Finalizar</button>
<div id="btnAprovar"></div>
</div>

<div id="listaDespesas"></div>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA52rHz97hUeTqobqmAbY58NLjkfO5O4jg",
  authDomain: "transportes-1af13.firebaseapp.com",
  projectId: "transportes-1af13"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let perfil, viagemAtual, statusAtual, freteAtual;

/* ICONES */
const icones = {
  "COMBUSTIVEL":"fa-gas-pump",
  "PEDAGIO":"fa-road",
  "MANUTENCAO":"fa-wrench",
  "BORRACHARIA":"fa-tire",
  "OLEO":"fa-oil-can",
  "TRIAGEM":"fa-box",
  "QUEBRA FRETE":"fa-triangle-exclamation",
  "ADIANTAMENTO":"fa-money-bill",
  "COMISSAO":"fa-user"
};

/* LOGIN */
window.entrarOperador=()=>{perfil="operador";login.style.display="none";operador.classList.remove("hidden");carregarOperador();}
window.entrarGestor=()=>{if(prompt("Senha")=="1234"){perfil="gestor";login.style.display="none";gestor.classList.remove("hidden");carregarGestor();}}

/* CRIAR */
window.criarViagem=async()=>{
await addDoc(collection(db,"viagens"),{
motorista: motorista.value,
origem: origem.value,
destino: destino.value,
localCarga: localCarga.value,
dataCarga: dataCarga.value,
localDescarga: localDescarga.value,
dataDescarga: dataDescarga.value,
frete: Number(frete.value),
status:"aberta"
});
carregarOperador();
}

/* TIPOS */
function carregarTipos(){
let base=["COMBUSTIVEL","OLEO","TRIAGEM","BORRACHARIA","MANUTENCAO","PEDAGIO","QUEBRA FRETE"];
let extra=["ADIANTAMENTO","COMISSAO"];
let lista = perfil==="gestor" ? [...base,...extra] : base;
tipo.innerHTML = lista.map(x=>`<option>${x}</option>`).join("");
}

/* LISTAS */
async function carregarOperador(){
let snap=await getDocs(collection(db,"viagens"));
let html="";
snap.forEach(d=>{
let v=d.data();
html+=`<div class="card" onclick="abrir('${d.id}')">
<b>${v.motorista}</b><br>${v.origem} → ${v.destino}
</div>`;
});
listaOperador.innerHTML=html;
}

async function carregarGestor(){
let snap=await getDocs(collection(db,"viagens"));
let html="";
for(let d of snap.docs){
let v=d.data();
html+=`<div class="card" onclick="abrirGestor('${d.id}')">
<b>${v.motorista}</b><br>${v.origem} → ${v.destino}
</div>`;
}
dashboard.innerHTML=html;
}

/* ABRIR */
window.abrir=async(id)=>{
viagemAtual=id;
operador.classList.add("hidden");
detalhe.classList.remove("hidden");

let snap=await getDocs(collection(db,"viagens"));
snap.forEach(d=>{
if(d.id===id){
let v=d.data();
titulo.innerText=v.motorista+" - "+v.origem+" → "+v.destino;
freteAtual=v.frete;
statusAtual=v.status;
}
});

carregarTipos();
carregarDetalhe();
}

window.abrirGestor=async(id)=>{gestor.classList.add("hidden");await abrir(id);}

/* DETALHE */
async function carregarDetalhe(){
let snap=await getDocs(collection(db,"viagens",viagemAtual,"despesas"));
let html="",total=0;

snap.forEach(d=>{
let tipo=d.data().tipo;
html+=`
<div class="card despesa">
<i class="fa ${icones[tipo] || 'fa-circle'}"></i>
<div>${tipo} - R$ ${d.data().valor}</div>
</div>`;
total+=d.data().valor;
});

listaDespesas.innerHTML=html;
resumo.innerHTML=`Frete: ${freteAtual}<br>Despesa: ${total}<br>Lucro: ${freteAtual-total}`;

if(statusAtual==="concluida" && perfil==="gestor"){
btnAprovar.innerHTML=`<button onclick="aprovarAtual()">Aprovar</button>`;
}else{
btnAprovar.innerHTML="";
}
}

/* ADD */
window.addDespesa=async()=>{
if(Number(valor.value)<=0){alert("Valor inválido");return;}
await addDoc(collection(db,"viagens",viagemAtual,"despesas"),{
tipo: tipo.value,
valor: Number(valor.value)
});
carregarDetalhe();
}

/* FINALIZAR */
window.finalizar=async()=>{
await updateDoc(doc(db,"viagens",viagemAtual),{status:"concluida"});
voltar();
}

/* APROVAR */
window.aprovarAtual=async()=>{
await updateDoc(doc(db,"viagens",viagemAtual),{status:"aprovada"});
voltar();
}

/* VOLTAR */
window.voltar=()=>{
detalhe.classList.add("hidden");
if(perfil==="gestor"){gestor.classList.remove("hidden");carregarGestor();}
else{operador.classList.remove("hidden");carregarOperador();}
}

</script>

</body>
</html>
