<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Viagens</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA52rHz97hUeTqobqmAbY58NLjkfO5O4jg",
  authDomain: "transportes-1af13.firebaseapp.com",
  projectId: "transportes-1af13",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.doc = doc;
window.updateDoc = updateDoc;

</script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8;}

.header {
  background:#1e3a8a;
  color:#fff;
  padding:15px;
  font-weight:bold;
}

.container { padding:20px;}

.kpis { display:flex; gap:10px; flex-wrap:wrap;}
.kpi {
  flex:1;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.status {
  padding:5px 10px;
  border-radius:5px;
  font-size:12px;
}

.aberta { background:orange; color:#fff;}
.fechada { background:green; color:#fff;}

button {
  padding:10px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
}

.hidden { display:none;}
</style>

</head>

<body>

<div class="header">Gestão Inteligente de Viagens</div>

<div class="container">

<!-- LOGIN -->
<div id="login">
<button onclick="operador()">👷 Operador</button>
<button onclick="gestor()">📊 Gestor</button>
</div>

<!-- OPERADOR -->
<div id="operador" class="hidden">
<h3>Nova Viagem</h3>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="frete" placeholder="Frete">

<button onclick="criarViagem()">Criar Viagem</button>
</div>

<!-- GESTOR -->
<div id="gestor" class="hidden">

<div class="kpis">
<div class="kpi">Total: <b id="total"></b></div>
<div class="kpi">Em andamento: <b id="abertas"></b></div>
<div class="kpi">Finalizadas: <b id="fechadas"></b></div>
<div class="kpi">Lucro Total: <b id="lucroTotal"></b></div>
</div>

<div id="cards"></div>

</div>

<!-- DETALHE -->
<div id="detalhe" class="hidden">
<button onclick="voltar()">⬅ Voltar</button>

<h3 id="titulo"></h3>

<div id="info"></div>

<h4>Adicionar Despesa</h4>

<input id="tipo" placeholder="Tipo">
<input id="valor" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>
<button onclick="fechar()">Finalizar Viagem</button>

<div id="despesasLista"></div>

</div>

</div>

<script>

let viagemAtual = null;

function operador(){
  login.style.display="none";
  operadorDiv.style.display="block";
}

function gestor(){
  let s = prompt("Senha:");
  if(s=="1234"){
    login.style.display="none";
    gestorDiv.style.display="block";
    carregar();
  }
}

async function criarViagem(){

await addDoc(collection(db,"viagens"),{
  origem: origem.value,
  destino: destino.value,
  frete: Number(frete.value),
  status:"aberta"
});

alert("Criado!");

}

async function carregar(){

let snap = await getDocs(collection(db,"viagens"));

let total=0, abertas=0, fechadas=0, lucroTotal=0;
let html="";

for (let d of snap.docs){

let v = d.data();
let despesasSnap = await getDocs(collection(db,"viagens", d.id, "despesas"));

let despesas = 0;
despesasSnap.forEach(x=> despesas += x.data().valor);

let lucro = v.frete - despesas;

total++;
if(v.status=="aberta") abertas++; else fechadas++;
lucroTotal += lucro;

html += `
<div class="card" onclick="abrir('${d.id}','${v.origem}','${v.destino}',${v.frete})">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status=='aberta'?'aberta':'fechada'}">${v.status}</span>
<br><br>

Receita: R$ ${v.frete}<br>
Despesa: R$ ${despesas}<br>
Lucro: <b style="color:${lucro>=0?'green':'red'}">R$ ${lucro}</b>

</div>
`;

}

cards.innerHTML = html;
total.innerText = total;
abertas.innerText = abertas;
fechadas.innerText = fechadas;
lucroTotal.innerText = "R$ "+lucroTotal;

}

async function abrir(id,origem,destino,frete){

viagemAtual = id;

gestorDiv.style.display="none";
detalhe.style.display="block";

titulo.innerText = origem + " → " + destino;

let despesasSnap = await getDocs(collection(db,"viagens", id, "despesas"));

let html="";
let total=0;

despesasSnap.forEach(d=>{
  html += `<div>${d.data().tipo} - R$ ${d.data().valor}</div>`;
  total += d.data().valor;
});

despesasLista.innerHTML = html;
info.innerHTML = `
Receita: R$ ${frete}<br>
Despesa: R$ ${total}<br>
Lucro: <b style="color:${frete-total>=0?'green':'red'}">R$ ${frete-total}</b>
`;

}

async function addDespesa(){

await addDoc(collection(db,"viagens", viagemAtual, "despesas"),{
  tipo: tipo.value,
  valor: Number(valor.value)
});

alert("Adicionado!");
abrir(viagemAtual);
}

async function fechar(){

await updateDoc(doc(db,"viagens",viagemAtual),{
  status:"fechada"
});

alert("Finalizada!");
voltar();

}

function voltar(){
detalhe.style.display="none";
gestorDiv.style.display="block";
carregar();
}

</script>

</body>
</html>
