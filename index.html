<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Control</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#eef2f7;
}

.header {
  background:linear-gradient(90deg,#1e3a8a,#2563eb);
  color:#fff;
  padding:18px;
  font-weight:600;
}

.container { padding:20px; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
}

.card {
  background:#fff;
  padding:18px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.kpis {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.kpi {
  flex:1;
  text-align:center;
}

.status {
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.aberta { background:#f59e0b; color:#fff;}
.concluida { background:#3b82f6; color:#fff;}
.aprovada { background:#16a34a; color:#fff;}

.lucroPos { color:#16a34a; font-weight:600;}
.lucroNeg { color:#dc2626; font-weight:600;}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #d1d5db;
}

.hidden { display:none; }
</style>

</head>

<body>

<div class="header">🚛 Fleet Control</div>

<div class="container">

<!-- LOGIN -->
<div id="login">
<button onclick="entrarOperador()">Operador</button>
<button onclick="entrarGestor()">Gestor</button>
</div>

<!-- OPERADOR -->
<div id="operador" class="hidden">
<h3>Nova Viagem</h3>

<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="frete" placeholder="Frete">

<button onclick="criarViagem()">Criar Viagem</button>

<div id="listaOperador"></div>
</div>

<!-- GESTOR -->
<div id="gestor" class="hidden">
<div id="dashboard"></div>
</div>

<!-- DETALHE -->
<div id="detalhe" class="hidden">

<button onclick="voltar()">⬅ Voltar</button>

<h3 id="titulo"></h3>

<div id="resumo"></div>

<h4>Adicionar Despesa</h4>
<input id="tipo" placeholder="Tipo">
<input id="valor" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>
<button onclick="finalizar()">Finalizar</button>
<button onclick="aprovarAtual()">Aprovar</button>

<div id="listaDespesas"></div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA52rHz97hUeTqobqmAbY58NLjkfO5O4jg",
  authDomain: "transportes-1af13.firebaseapp.com",
  projectId: "transportes-1af13"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let viagemAtual = null;
let freteAtual = 0;

/* LOGIN */
window.entrarOperador = function(){
login.style.display="none";
operador.classList.remove("hidden");
carregarOperador();
}

window.entrarGestor = function(){
let s = prompt("Senha:");
if(s==="1234"){
login.style.display="none";
gestor.classList.remove("hidden");
carregarGestor();
}
}

/* CRIAR */
window.criarViagem = async function(){

await addDoc(collection(db,"viagens"),{
origem: origem.value,
destino: destino.value,
frete: Number(frete.value),
status:"aberta"
});

carregarOperador();
}

/* OPERADOR */
async function carregarOperador(){

let snap = await getDocs(collection(db,"viagens"));
let html="";

snap.forEach(d=>{
let v = d.data();

html+=`
<div class="card" onclick="abrir('${d.id}')">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span>
</div>
`;
});

listaOperador.innerHTML = html;
}

/* GESTOR */
async function carregarGestor(){

let snap = await getDocs(collection(db,"viagens"));

let html="";
let total=0;
let lucroTotal=0;
let dadosGrafico=[];

for(let d of snap.docs){

let v = d.data();

let despSnap = await getDocs(collection(db,"viagens",d.id,"despesas"));

let totalDesp=0;
despSnap.forEach(x=> totalDesp+=x.data().valor);

let lucro = v.frete - totalDesp;

total++;
lucroTotal += lucro;
dadosGrafico.push(lucro);

html+=`
<div class="card" onclick="abrirGestor('${d.id}')">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span><br><br>

Receita: ${v.frete}<br>
Despesa: ${totalDesp}<br>
Lucro: <span class="${lucro>=0?'lucroPos':'lucroNeg'}">R$ ${lucro}</span>
</div>
`;
}

dashboard.innerHTML = `
<div class="kpis">
<div class="card kpi">Viagens<br><b>${total}</b></div>
<div class="card kpi">Lucro Total<br><b>R$ ${lucroTotal}</b></div>
</div>

<canvas id="grafico" height="120"></canvas>

${html}
`;

desenharGrafico(dadosGrafico);
}

/* DETALHE OPERADOR */
window.abrir = async function(id){

viagemAtual = id;

operador.classList.add("hidden");
detalhe.classList.remove("hidden");

let snap = await getDocs(collection(db,"viagens"));

snap.forEach(d=>{
if(d.id===id){
titulo.innerText = d.data().origem+" → "+d.data().destino;
freteAtual = d.data().frete;
}
});

carregarDetalhe();
}

/* DETALHE GESTOR */
window.abrirGestor = async function(id){
gestor.classList.add("hidden");
await abrir(id);
}

/* DETALHE */
async function carregarDetalhe(){

let snap = await getDocs(collection(db,"viagens",viagemAtual,"despesas"));

let html="";
let total=0;

snap.forEach(d=>{
html+=`<div class="card">${d.data().tipo} - R$ ${d.data().valor}</div>`;
total+=d.data().valor;
});

listaDespesas.innerHTML = html;

resumo.innerHTML = `
Receita: R$ ${freteAtual}<br>
Despesa: R$ ${total}<br>
Lucro: <b class="${freteAtual-total>=0?'lucroPos':'lucroNeg'}">R$ ${freteAtual-total}</b>
`;
}

/* DESPESA */
window.addDespesa = async function(){

await addDoc(collection(db,"viagens",viagemAtual,"despesas"),{
tipo: tipo.value,
valor: Number(valor.value)
});

carregarDetalhe();
}

/* FINALIZAR */
window.finalizar = async function(){

await updateDoc(doc(db,"viagens",viagemAtual),{
status:"concluida"
});

alert("Finalizada");
voltar();
}

/* APROVAR */
window.aprovarAtual = async function(){

await updateDoc(doc(db,"viagens",viagemAtual),{
status:"aprovada"
});

alert("Aprovada");
voltar();
}

/* VOLTAR */
window.voltar = function(){
detalhe.classList.add("hidden");
gestor.classList.remove("hidden");
carregarGestor();
}

/* GRÁFICO */
function desenharGrafico(dados){

let canvas = document.getElementById("grafico");
if(!canvas) return;

let ctx = canvas.getContext("2d");

ctx.clearRect(0,0,300,150);

dados.forEach((v,i)=>{
ctx.fillStyle = v>=0 ? "green":"red";
ctx.fillRect(i*30,150-v/10,20,v/10);
});
}

</script>

</body>
</html>
