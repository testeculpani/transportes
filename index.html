<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Transportes</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f4f6f8;
}

.header {
  background:#1e3a8a;
  color:#fff;
  padding:15px;
  font-weight:bold;
}

.container { padding:15px; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
}

.status {
  padding:5px 10px;
  border-radius:5px;
  font-size:12px;
}

.aberta { background:orange; color:#fff;}
.concluida { background:#2563eb; color:#fff;}
.aprovada { background:green; color:#fff;}

.hidden { display:none; }

</style>
</head>

<body>

<div class="header">🚛 Gestão de Transportes</div>

<div class="container">

<!-- LOGIN -->
<div id="login">
<button onclick="operador()">Operador</button>
<button onclick="gestor()">Gestor</button>
</div>

<!-- OPERADOR -->
<div id="telaOperador" class="hidden">

<h3>Nova Viagem</h3>
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="frete" placeholder="Frete">

<button onclick="criarViagem()">Criar Viagem</button>

<div id="listaOperador"></div>

</div>

<!-- GESTOR -->
<div id="telaGestor" class="hidden">
<h3>Painel Gestor</h3>
<div id="listaGestor"></div>
</div>

<!-- DETALHE -->
<div id="telaDetalhe" class="hidden">

<button onclick="voltar()">⬅ Voltar</button>

<h3 id="titulo"></h3>

<div id="resumo"></div>

<h4>Adicionar Despesa</h4>
<input id="tipo" placeholder="Tipo">
<input id="valor" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>
<button onclick="finalizar()">Finalizar Viagem</button>

<div id="despesas"></div>

</div>

</div>

<script>

let viagens = JSON.parse(localStorage.getItem("viagens")) || [];
let viagemAtual = null;

/* LOGIN */
function operador(){
  login.style.display="none";
  telaOperador.classList.remove("hidden");
  renderOperador();
}

function gestor(){
  let s = prompt("Senha:");
  if(s === "1234"){
    login.style.display="none";
    telaGestor.classList.remove("hidden");
    renderGestor();
  }
}

/* CRIAR */
function criarViagem(){

let v = {
  id: Date.now(),
  origem: origem.value,
  destino: destino.value,
  frete: Number(frete.value),
  despesas: [],
  status: "aberta"
};

viagens.push(v);
salvar();

renderOperador();

}

/* OPERADOR LISTA */
function renderOperador(){

let html="";

viagens.forEach(v=>{

html+=`
<div class="card" onclick="abrir(${v.id})">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span>
</div>
`;

});

listaOperador.innerHTML = html;

}

/* GESTOR */
function renderGestor(){

let html="";

viagens.forEach(v=>{

let total = v.despesas.reduce((a,b)=>a+b.valor,0);
let lucro = v.frete - total;

html+=`
<div class="card">
<b>${v.origem} → ${v.destino}</b><br>
<span class="status ${v.status}">${v.status}</span><br><br>

Receita: ${v.frete}<br>
Despesa: ${total}<br>
Lucro: ${lucro}<br>

${v.status==="concluida" ? `<button onclick="aprovar(${v.id})">Aprovar</button>` : ""}

</div>
`;

});

listaGestor.innerHTML = html;

}

/* ABRIR */
function abrir(id){

viagemAtual = viagens.find(v=>v.id===id);

telaOperador.classList.add("hidden");
telaDetalhe.classList.remove("hidden");

atualizarDetalhe();

}

/* DETALHE */
function atualizarDetalhe(){

titulo.innerText = viagemAtual.origem + " → " + viagemAtual.destino;

let total = viagemAtual.despesas.reduce((a,b)=>a+b.valor,0);

resumo.innerHTML = `
Receita: ${viagemAtual.frete}<br>
Despesa: ${total}<br>
Lucro: ${viagemAtual.frete-total}
`;

let html="";

viagemAtual.despesas.forEach(d=>{
  html+=`<div>${d.tipo} - ${d.valor}</div>`;
});

despesas.innerHTML = html;

}

/* ADD DESPESA */
function addDespesa(){

viagemAtual.despesas.push({
  tipo: tipo.value,
  valor: Number(valor.value)
});

salvar();
atualizarDetalhe();

}

/* FINALIZAR */
function finalizar(){
viagemAtual.status = "concluida";
salvar();
voltar();
}

/* APROVAR */
function aprovar(id){

let v = viagens.find(x=>x.id===id);
v.status = "aprovada";

salvar();
renderGestor();

}

/* SALVAR */
function salvar(){
localStorage.setItem("viagens", JSON.stringify(viagens));
}

/* VOLTAR */
function voltar(){
telaDetalhe.classList.add("hidden");
telaOperador.classList.remove("hidden");
renderOperador();
}

</script>

</body>
</html>
